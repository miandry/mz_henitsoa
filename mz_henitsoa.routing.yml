mz_henitsoa.controller:
  path: '/admin/build'
  defaults:
    _controller: '\Drupal\mz_henitsoa\Controller\HenitsoaController::build'
    _title: 'Techargement document'
  requirements:
     _permission: 'access administration pages'
  options:
     _admin_route: TRUE

mz_henitsoa.app:
  path: '/app'
  defaults:
    _controller: '\Drupal\mz_henitsoa\Controller\HenitsoaController::app'
    _title: 'Henitsoa App'
  requirements:
     _permission: 'access content'

# Catches every sub-path of the Vue Router (history mode), e.g. /app/classes,
# so deep links and page refreshes inside the SPA don't 404 in Drupal.
#
# Drupal's route provider matches candidate routes by exact path-segment
# count before applying the requirement regex, so a single-parameter route
# (however permissive its regex) never matches a 3-segment path like
# /app/eleves-inscrits/3365 — hence the second, explicit 2-parameter route
# below for detail pages (/app/{section}/{id}).
mz_henitsoa.app_subpath:
  path: '/app/{vue_path}'
  defaults:
    _controller: '\Drupal\mz_henitsoa\Controller\HenitsoaController::app'
    _title: 'Henitsoa App'
    vue_path: ''
  requirements:
     vue_path: '.*'
     _permission: 'access content'

mz_henitsoa.app_subpath_detail:
  path: '/app/{section}/{id}'
  defaults:
    _controller: '\Drupal\mz_henitsoa\Controller\HenitsoaController::app'
    _title: 'Henitsoa App'
  requirements:
     section: '.+'
     id: '.+'
     _permission: 'access content'

